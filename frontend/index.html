          <h1>Nepal Election Results 2082 (2026) — Live Vote Count</h1>
          <p>
            NepalVotes is an independent informational dashboard tracking the vote count for
            Nepal's House of Representatives (Pratinidhi Sabha) General Election 2082, held on
            March 5, 2026. Data is fetched automatically from the official results website of the
            <a href="https://result.election.gov.np" target="_blank" rel="noopener noreferrer">Election Commission of Nepal</a>
            and refreshes every 30 seconds.
          </p>
          <p>
            This site covers all 165 First-Past-The-Post (FPTP) constituencies across Nepal's
            7 provinces — Koshi, Madhesh, Bagmati, Gandaki, Lumbini, Karnali, and Sudurpashchim.
            3,406 candidates are contesting under more than 66 registered political parties and as
            independents. The House of Representatives has 275 total seats: 165 FPTP and 110
            allocated through proportional representation.
          </p>
          <p>What you can explore on this dashboard:</p>
          <ul>
            <li>Detailed results for all 165 FPTP constituencies</li>
            <li>Individual candidate profile pages with biographical information</li>
            <li>Party seat tallies combining FPTP wins and proportional representation estimates</li>
            <li>Province-level breakdown across all 7 provinces</li>
            <li>Interactive Nepal province map showing leading parties by region</li>
            <li>Filter by province, district, party, or gender</li>
          </ul>
          <p>
            NepalVotes is not affiliated with the Election Commission, any political party, or
            any government body. All data is sourced exclusively from
            <a href="https://result.election.gov.np">result.election.gov.np</a>.
            For official and final results, refer directly to the Election Commission of Nepal.
          </p>
