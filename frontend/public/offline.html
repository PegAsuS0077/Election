<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — NepalVotes</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .flag { font-size: 3rem; margin-bottom: 16px; }
      h1 { font-size: 1.5rem; font-weight: 700; color: #f8fafc; margin-bottom: 8px; }
      p { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; max-width: 360px; }
      .retry {
        margin-top: 24px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }
      .retry:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="flag">🇳🇵</div>
    <h1>You're offline</h1>
    <p>NepalVotes needs an internet connection to show live election results. Please check your connection and try again.</p>
    <a class="retry" href="/" onclick="window.location.reload(); return false;">
      ↺ Retry
    </a>
  </body>
</html>
