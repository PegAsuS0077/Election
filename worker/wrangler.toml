name = "nepalvotes-scraper"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = []
# Workers + R2 are available on the free tier — no paid plan required.

[[r2_buckets]]
binding = "RESULTS_BUCKET"
bucket_name = "nepal-election-gh-actions"

[triggers]
crons = ["*/1 * * * *"]

[vars]
# Base URL of the deployed frontend — used to fetch /neu_candidates.json
# for English name enrichment. Override in the Cloudflare dashboard if needed.
FRONTEND_URL = "https://nepalvotes.live"
